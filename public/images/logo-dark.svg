    <radialGradient id="chipGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#5C3210"/>
      <stop offset="100%" stop-color="#2A1406"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="cookieGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#C9A020" flood-opacity="0.4"/>
    </filter>
