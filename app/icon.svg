<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FDFAF3"/>
      <stop offset="100%" stop-color="#EFE8D8"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#A8832A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="dripGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#A8832A"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#A8832A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="300" cy="300" r="275" fill="url(#bgGrad)" filter="url(#softShadow)"/>
  <circle cx="300" cy="300" r="268" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-dasharray="4 7"/>
  <circle cx="300" cy="300" r="258" fill="none" stroke="url(#ringGrad)" stroke-width="0.8"/>

  <!-- Drips -->
  <path d="M300,32 Q300,80 300,105" stroke="url(#dripGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>
  <ellipse cx="300" cy="110" rx="11" ry="14" fill="#C9A84C"/>

  <path d="M258,34 Q257,72 257,94" stroke="url(#dripGrad)" stroke-width="13" stroke-linecap="round" fill="none"/>
  <ellipse cx="257" cy="98" rx="7.5" ry="10" fill="#C9A84C" opacity="0.8"/>

  <path d="M342,34 Q343,72 343,94" stroke="url(#dripGrad)" stroke-width="13" stroke-linecap="round" fill="none"/>
  <ellipse cx="343" cy="98" rx="7.5" ry="10" fill="#C9A84C" opacity="0.8"/>

  <path d="M218,42 Q216,68 217,85" stroke="url(#dripGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
  <ellipse cx="217" cy="88" rx="5" ry="6.5" fill="#C9A84C" opacity="0.55"/>

  <path d="M382,42 Q384,68 383,85" stroke="url(#dripGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
  <ellipse cx="383" cy="88" rx="5" ry="6.5" fill="#C9A84C" opacity="0.55"/>

  <!-- Top rule -->
  <line x1="100" y1="172" x2="500" y2="172" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
  <polygon points="100,172 109,165 118,172 109,179" fill="#C9A84C"/>
  <polygon points="482,172 491,165 500,172 491,179" fill="#C9A84C"/>
  <polygon points="192,172 199,167 206,172 199,177" fill="#C9A84C" opacity="0.55"/>
  <polygon points="394,172 401,167 408,172 401,177" fill="#C9A84C" opacity="0.55"/>

  <!-- Brand name -->
  <text x="300" y="246"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="60"
        font-weight="700"
        letter-spacing="7"
        text-anchor="middle"
        fill="url(#goldGrad)">YASMINA'S</text>

  <text x="300" y="308"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="62"
        font-weight="700"
        letter-spacing="16"
        text-anchor="middle"
        fill="url(#goldGrad)">BITES</text>

  <!-- Divider around tagline -->
  <line x1="128" y1="328" x2="220" y2="328" stroke="#C9A84C" stroke-width="0.9" opacity="0.8"/>
  <line x1="380" y1="328" x2="472" y2="328" stroke="#C9A84C" stroke-width="0.9" opacity="0.8"/>
  <circle cx="227" cy="328" r="2.8" fill="#C9A84C"/>
  <circle cx="373" cy="328" r="2.8" fill="#C9A84C"/>
  <circle cx="235" cy="328" r="1.6" fill="#C9A84C" opacity="0.5"/>
  <circle cx="365" cy="328" r="1.6" fill="#C9A84C" opacity="0.5"/>

  <!-- Tagline -->
  <text x="300" y="356"
        font-family="Georgia, serif"
        font-size="21"
        font-style="italic"
        letter-spacing="1.5"
        text-anchor="middle"
        fill="#A8832A"
        opacity="0.9">Little bites of happiness</text>

  <!-- Cookie stack left -->
  <ellipse cx="178" cy="446" rx="30" ry="8.5" fill="none" stroke="#B8962E" stroke-width="1.8"/>
  <ellipse cx="178" cy="435" rx="30" ry="8.5" fill="none" stroke="#B8962E" stroke-width="1.8"/>
  <ellipse cx="178" cy="424" rx="30" ry="8.5" fill="none" stroke="#B8962E" stroke-width="1.8"/>
  <circle cx="170" cy="422" r="2.5" fill="#B8962E"/>
  <circle cx="183" cy="424" r="2" fill="#B8962E"/>
  <circle cx="174" cy="428" r="1.8" fill="#B8962E"/>
  <circle cx="186" cy="420" r="1.5" fill="#B8962E" opacity="0.7"/>

  <!-- Mason jar center -->
  <rect x="261" y="398" width="78" height="82" rx="10" fill="none" stroke="#B8962E" stroke-width="2.2"/>
  <rect x="267" y="388" width="66" height="18" rx="5" fill="none" stroke="#B8962E" stroke-width="1.8"/>
  <rect x="274" y="382" width="52" height="10" rx="3" fill="none" stroke="#B8962E" stroke-width="1.5"/>
  <ellipse cx="300" cy="447" rx="18" ry="9" fill="none" stroke="#B8962E" stroke-width="1.3" opacity="0.65"/>
  <ellipse cx="300" cy="436" rx="18" ry="9" fill="none" stroke="#B8962E" stroke-width="1.3" opacity="0.65"/>
  <ellipse cx="300" cy="425" rx="16" ry="8" fill="none" stroke="#B8962E" stroke-width="1.3" opacity="0.65"/>

  <!-- Cake slice right -->
  <path d="M390,452 L412,396 L454,396 L432,452 Z" fill="none" stroke="#B8962E" stroke-width="2"/>
  <path d="M413,396 Q416,408 414,420" stroke="#B8962E" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M427,396 Q430,410 428,422" stroke="#B8962E" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <line x1="393" y1="433" x2="430" y2="433" stroke="#B8962E" stroke-width="1" opacity="0.6"/>
  <line x1="396" y1="418" x2="437" y2="418" stroke="#B8962E" stroke-width="1" opacity="0.6"/>

  <!-- Botanical vines -->
  <path d="M115,492 Q148,481 175,492 Q198,501 222,490 Q240,481 258,488"
        stroke="#B8962E" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M485,492 Q452,481 425,492 Q402,501 378,490 Q360,481 342,488"
        stroke="#B8962E" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Left leaves -->
  <ellipse cx="138" cy="484" rx="9" ry="4.5" fill="none" stroke="#B8962E" stroke-width="1.3" transform="rotate(-25,138,484)"/>
  <ellipse cx="160" cy="478" rx="8" ry="4" fill="none" stroke="#B8962E" stroke-width="1.3" transform="rotate(18,160,478)"/>
  <ellipse cx="200" cy="497" rx="8" ry="4" fill="none" stroke="#B8962E" stroke-width="1.3" transform="rotate(-12,200,497)"/>
  <ellipse cx="228" cy="483" rx="7.5" ry="3.8" fill="none" stroke="#B8962E" stroke-width="1.3" transform="rotate(22,228,483)"/>

  <!-- Right leaves -->
  <ellipse cx="462" cy="484" rx="9" ry="4.5" fill="none" stroke="#B8962E" stroke-width="1.3" transform="rotate(25,462,484)"/>
  <ellipse cx="440" cy="478" rx="8" ry="4" fill="none" stroke="#B8962E" stroke-width="1.3" transform="rotate(-18,440,478)"/>
  <ellipse cx="400" cy="497" rx="8" ry="4" fill="none" stroke="#B8962E" stroke-width="1.3" transform="rotate(12,400,497)"/>
  <ellipse cx="372" cy="483" rx="7.5" ry="3.8" fill="none" stroke="#B8962E" stroke-width="1.3" transform="rotate(-22,372,483)"/>

  <!-- Center ornament -->
  <circle cx="300" cy="490" r="3.5" fill="#C9A84C"/>
  <circle cx="284" cy="492" r="2" fill="#C9A84C" opacity="0.6"/>
  <circle cx="316" cy="492" r="2" fill="#C9A84C" opacity="0.6"/>

  <!-- Bottom rule -->
  <line x1="100" y1="516" x2="500" y2="516" stroke="#C9A84C" stroke-width="1.2" opacity="0.7"/>
  <polygon points="100,516 109,509 118,516 109,523" fill="#C9A84C"/>
  <polygon points="482,516 491,509 500,516 491,523" fill="#C9A84C"/>

  <!-- Footer text -->
  <text x="300" y="540"
        font-family="Georgia, serif"
        font-size="11"
        letter-spacing="5.5"
        text-anchor="middle"
        fill="#A8832A"
        opacity="0.7">ARTISAN · SWEETS · AMMAN</text>
</svg>
